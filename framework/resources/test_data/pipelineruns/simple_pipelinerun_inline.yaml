apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: simple-pipelinerun-inline-
spec:
  pipelineSpec:
    tasks:
      - name: greet
        taskSpec:
          steps:
            - name: say-hello
              image: registry.access.redhat.com/ubi9/ubi-minimal:latest
              script: |
                #!/bin/sh
                echo "Hello from pipeline!"
      - name: check
        taskSpec:
          steps:
            - name: verify
              image: registry.access.redhat.com/ubi9/ubi-minimal:latest
              script: |
                #!/bin/sh
                echo "Verification complete!"
