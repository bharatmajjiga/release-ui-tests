apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: simple-pipeline
  resourceVersion: "{{metadata.resourceVersion}}"
  uid: "{{metadata.uid}}"
  labels:
    version: v2
spec:
  tasks:
    - name: greet
      taskSpec:
        steps:
          - name: say-hello
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            script: |
              #!/bin/sh
              echo "Hello from pipeline!"
    - name: farewell
      taskSpec:
        steps:
          - name: say-goodbye
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            script: |
              #!/bin/sh
              echo "Goodbye from pipeline!"
